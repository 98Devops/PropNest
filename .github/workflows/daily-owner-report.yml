# TREVIS — Daily Owner Report (runs from PropNest, the living repo)
#
# Every morning: reads the portfolio through the SAME coverage engine the new
# dashboard uses, and emails the owner a health + overdue + expiring report via
# Resend. Prints a WhatsApp click-to-send summary in the run log too.
#
# Free: runs on GitHub Actions, NOT Netlify — zero deploys, zero credits.
#
# REQUIRED REPO SECRETS (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL          https://<ref>.supabase.co
#   SUPABASE_SERVICE_KEY  service_role key (server-side only; bypasses RLS to read all)
#   RESEND_API_KEY        from resend.com (free tier)
#   REPORT_TO_EMAIL       owner's email (e.g. trevisdaradi@gmail.com)
# OPTIONAL:
#   REPORT_CC_EMAIL       delivery canary / backup copy
#   REPORT_FROM_EMAIL     verified sender (default onboarding@resend.dev)
#   OWNER_WHATSAPP        e.g. 263777553271 — adds a click-to-send link to the log

name: Daily Owner Report

on:
  schedule:
    # GitHub's scheduler runs top-of-hour jobs late (big queue). Off-peak minute +
    # ~40min early so a normal delay still lands near 07:00 CAT. 04:21 UTC = 06:21 CAT.
    # For GUARANTEED on-time delivery, trigger workflow_dispatch from an external cron.
    - cron: '21 4 * * *'
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Supabase client
        run: npm install --no-save @supabase/supabase-js
      - name: Send daily owner report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
          REPORT_CC_EMAIL: ${{ secrets.REPORT_CC_EMAIL }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          OWNER_WHATSAPP: ${{ secrets.OWNER_WHATSAPP }}
        run: node scripts/daily_owner_report.mjs
